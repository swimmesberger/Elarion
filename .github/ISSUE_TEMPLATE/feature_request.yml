name: Feature request
description: Suggest an idea or enhancement for Elarion
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please check existing issues and discussions first.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What is the use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you would like. Code sketches are welcome.
      render: csharp
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: boundaries
    attributes:
      label: Scope
      description: Elarion stays domain-neutral and reusable.
      options:
        - label: This is a reusable framework concern, not application-specific functionality.
          required: true
