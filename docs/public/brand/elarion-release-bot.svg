<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="symbolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6E45F6"/>
      <stop offset="52%" stop-color="#2E68FF"/>
      <stop offset="100%" stop-color="#2FD6E8"/>
    </linearGradient>
    <linearGradient id="symbolGradH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6E45F6"/>
      <stop offset="65%" stop-color="#2E68FF"/>
      <stop offset="100%" stop-color="#2FD6E8"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6E45F6"/>
      <stop offset="52%" stop-color="#2E68FF"/>
      <stop offset="100%" stop-color="#2FD6E8"/>
    </linearGradient>
    <!-- SVG 1.1 compatible drop shadow for main card -->
    <filter id="mainShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feFlood flood-color="#000000" flood-opacity="0.20" result="flood"/>
      <feComposite in="flood" in2="SourceGraphic" operator="in" result="shadow"/>
      <feGaussianBlur in="shadow" stdDeviation="18" result="blur"/>
      <feOffset dx="0" dy="16" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- SVG 1.1 compatible drop shadow for badge -->
    <filter id="badgeShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feFlood flood-color="#000000" flood-opacity="0.35" result="flood"/>
      <feComposite in="flood" in2="SourceGraphic" operator="in" result="shadow"/>
      <feGaussianBlur in="shadow" stdDeviation="12" result="blur"/>
      <feOffset dx="0" dy="8" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main icon background -->
  <rect x="72" y="72" width="880" height="880" rx="190" fill="#07142E" filter="url(#mainShadow)"/>

  <!-- Elarion symbol — same proportions as elarion-app-icon-dark -->
  <g transform="translate(248 268) scale(2.35)">
    <circle cx="34" cy="52"  r="14" fill="url(#symbolGrad)"/>
    <circle cx="34" cy="110" r="14" fill="url(#symbolGrad)" opacity="0.92"/>
    <circle cx="34" cy="168" r="14" fill="url(#symbolGrad)" opacity="0.84"/>

    <rect x="64" y="38"  width="126" height="28" rx="14" fill="url(#symbolGradH)"/>
    <rect x="64" y="96"  width="92"  height="28" rx="14" fill="url(#symbolGradH)"/>
    <rect x="64" y="154" width="152" height="28" rx="14" fill="url(#symbolGradH)"/>

    <rect x="64" y="77"  width="56" height="14" rx="7" fill="url(#symbolGradH)" opacity="0.36"/>
    <rect x="64" y="135" width="78" height="14" rx="7" fill="url(#symbolGradH)" opacity="0.36"/>
  </g>

  <!-- Release-bot badge: gradient circle, bottom-right -->
  <circle cx="790" cy="796" r="152" fill="#07142E" filter="url(#badgeShadow)"/>
  <circle cx="790" cy="796" r="140" fill="url(#badgeGrad)"/>

  <!-- Rocket inside badge, pointing upper-right (rotated -45°) -->
  <g transform="translate(790 796) rotate(-45)">
    <!-- Body pill -->
    <rect x="-28" y="-72" width="56" height="92" rx="28" fill="white"/>
    <!-- Left fin -->
    <polygon points="-28,10 -54,52 -28,44" fill="white" opacity="0.80"/>
    <!-- Right fin -->
    <polygon points="28,10 54,52 28,44" fill="white" opacity="0.80"/>
    <!-- Porthole -->
    <circle cx="0" cy="-26" r="14" fill="url(#badgeGrad)"/>
    <!-- Exhaust plume -->
    <ellipse cx="0" cy="48" rx="16" ry="22" fill="white" opacity="0.55"/>
    <ellipse cx="0" cy="52" rx="9"  ry="14" fill="white" opacity="0.85"/>
  </g>
</svg>
